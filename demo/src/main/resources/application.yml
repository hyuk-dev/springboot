spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  datasource:
    url: jdbc:h2:mem:testdb
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false
    prefix: classpath:/templates/